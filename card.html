<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartička | SZZ Příprava</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="subjects/shared.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$','$'],['\\(','\\)']],
                displayMath: [['$$','$$'],['\\[','\\]']],
                macros: { N:"\\mathbb{N}", R:"\\mathbb{R}", Z:"\\mathbb{Z}", Q:"\\mathbb{Q}", C:"\\mathbb{C}" }
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Wider reading area than default subject pages */
        .container { max-width: 860px; }

        #renderedContent {
            line-height: 1.75;
        }
        #renderedContent h2 {
            color: #0d6efd;
            border-bottom: 2px solid #0d6efd;
            padding-bottom: .35rem;
            margin: 2rem 0 .9rem;
            font-size: 1.25rem;
        }
        body.dark-mode #renderedContent h2 {
            color: #6ea8fe;
            border-color: #6ea8fe;
        }
        #renderedContent h3 {
            color: #6c757d;
            margin: 1.4rem 0 .5rem;
            font-size: 1.05rem;
            border: none;
        }
        body.dark-mode #renderedContent h3 {
            color: #adb5bd;
        }
        #renderedContent ul, #renderedContent ol {
            padding-left: 1.4rem;
        }
        #renderedContent blockquote {
            border-left: 4px solid #0d6efd;
            padding: .5rem 1rem;
            margin: 1rem 0;
            background: #eef4ff;
            border-radius: 0 4px 4px 0;
        }
        body.dark-mode #renderedContent blockquote {
            background: #1a2740;
            border-color: #5b9bff;
        }
        #renderedContent pre {
            background: #f1f3f5;
            border-radius: 6px;
            padding: .85rem 1rem;
            overflow-x: auto;
        }
        body.dark-mode #renderedContent pre {
            background: #252525;
        }
        #renderedContent code {
            font-size: .88em;
        }

        #editTextarea {
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: .88rem;
            min-height: 450px;
            resize: vertical;
            line-height: 1.55;
        }

        body.dark-mode .form-control,
        body.dark-mode .form-select {
            background: #2d2d2d;
            border-color: #555;
            color: #e0e0e0;
        }

        .card-title-bar {
            border-left: 4px solid var(--accent, #0d6efd);
            padding-left: .75rem;
        }

        .tag-badge {
            font-size: .72rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" style="height:60px;">
        <div class="container-fluid">
            <a class="navbar-brand" href="cards.html">
                <i class="fas fa-arrow-left me-2"></i>Kartičky
            </a>
            <div class="ms-auto d-flex align-items-center gap-1">
                <button class="btn btn-outline-light btn-sm d-none d-sm-inline-flex align-items-center gap-1" id="editBtn">
                    <i class="fas fa-edit"></i><span class="d-none d-md-inline ms-1">Upravit</span>
                </button>
                <button class="btn btn-success btn-sm d-none align-items-center gap-1" id="saveBtn">
                    <i class="fas fa-save"></i><span class="d-none d-md-inline ms-1">Uložit</span>
                </button>
                <button class="btn btn-outline-light btn-sm d-none" id="cancelBtn">
                    <i class="fas fa-times"></i>
                </button>
                <button class="btn btn-outline-light btn-sm d-sm-none" id="editBtnMobile" title="Upravit">
                    <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-link text-white" id="deleteBtn" title="Smazat kartičku">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button class="btn btn-link text-white" id="themeToggle" title="Přepnout motiv">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container pt-4 pb-5">
        <!-- Loading -->
        <div id="loadingState" class="text-center py-5 text-muted">
            <i class="fas fa-spinner fa-spin fa-2x mb-3 d-block"></i>
            Načítání kartičky…
        </div>

        <!-- Card -->
        <div id="cardWrap" style="display:none;">
            <!-- Header -->
            <div class="mb-4">
                <span id="subjectBadge" class="badge mb-2" style="font-size:.78rem;"></span>
                <div class="card-title-bar">
                    <h1 id="cardTitle" class="mb-1" style="font-size:1.6rem;border:none;padding:0;"></h1>
                    <div id="cardMeta" class="text-muted mt-1" style="font-size:.82rem;"></div>
                </div>
            </div>

            <!-- View -->
            <div id="viewMode">
                <div id="renderedContent"></div>
            </div>

            <!-- Edit -->
            <div id="editMode" style="display:none;">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Otázka / Titulek</label>
                    <input type="text" class="form-control" id="editTitle">
                </div>
                <div class="row mb-3">
                    <div class="col-sm-6 mb-3 mb-sm-0">
                        <label class="form-label fw-semibold">Předmět</label>
                        <select class="form-select" id="editSubject">
                            <option value="">— bez předmětu —</option>
                            <optgroup label="Teoretické">
                                <option value="ZDM">ZDM – Diskrétní matematika</option>
                                <option value="MAA">MAA – Matematická analýza</option>
                                <option value="LAG">LAG – Lineární algebra</option>
                                <option value="OMO">OMO – Objektové modelování</option>
                                <option value="DSA">DSA – Datové struktury a alg.</option>
                                <option value="PRA">PRA – Pravděpodobnost</option>
                                <option value="KAB">KAB – Kryptografie</option>
                                <option value="DBS">DBS – Databázové systémy</option>
                            </optgroup>
                            <optgroup label="Specializační">
                                <option value="ZWA">ZWA – Webové aplikace</option>
                                <option value="TS1">TS1 – Testování softwaru</option>
                                <option value="PM2">PM2 – Projektové řízení</option>
                                <option value="PSI">PSI – Počítačové sítě</option>
                                <option value="INS">INS – Informační systémy</option>
                                <option value="ISP">ISP – IS a procesy</option>
                                <option value="ZDA">ZDA – Datová analýza</option>
                                <option value="TPA">TPA – Tech. podnik. aplikací</option>
                                <option value="MPR">MPR – Metody pro rozhodování</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Tagy <span class="fw-normal text-muted">(čárkou)</span></label>
                        <input type="text" class="form-control" id="editTags">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Obsah <span class="fw-normal text-muted">(Markdown + HTML boxy)</span></label>
                    <textarea class="form-control" id="editTextarea"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" id="saveBtnBottom">
                        <i class="fas fa-save me-1"></i>Uložit
                    </button>
                    <button class="btn btn-outline-secondary" id="cancelBtnBottom">Zrušit</button>
                </div>
            </div>
        </div>

        <!-- Error -->
        <div id="errorState" style="display:none;">
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle me-2"></i>
                Kartička nenalezena nebo chyba načítání.
                <a href="cards.html" class="alert-link ms-2">← Zpět na kartičky</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const FIREBASE_URL = 'https://statnice-391c5-default-rtdb.europe-west1.firebasedatabase.app';
        const THEORETICAL = ['ZDM','MAA','LAG','OMO','DSA','PRA','KAB','DBS'];

        function subjectColor(code) {
            if (!code) return '#6c757d';
            return THEORETICAL.includes(code) ? '#0d6efd' : '#198754';
        }

        const params = new URLSearchParams(location.search);
        const cardId = params.get('id');
        let currentCard = null;

        // ── Theme ──────────────────────────────────────────────────────
        function applyTheme() {
            const dark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', dark);
            document.getElementById('themeToggle').innerHTML = dark
                ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        document.getElementById('themeToggle').addEventListener('click', () => {
            const dark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', dark ? 'dark' : 'light');
            document.getElementById('themeToggle').innerHTML = dark
                ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });
        applyTheme();

        // ── Load ───────────────────────────────────────────────────────
        async function loadCard() {
            if (!cardId) { showError(); return; }
            try {
                const res = await fetch(`${FIREBASE_URL}/cards/${cardId}.json`);
                const card = await res.json();
                if (!card || card.error) { showError(); return; }
                currentCard = card;
                renderCard(card);
            } catch {
                showError();
            }
        }

        function renderCard(card) {
            document.title = `${card.title || 'Kartička'} | SZZ Příprava`;
            const color = subjectColor(card.subject);

            document.documentElement.style.setProperty('--accent', color);

            const badge = document.getElementById('subjectBadge');
            if (card.subject) {
                badge.textContent = card.subject;
                badge.style.background = color;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }

            document.getElementById('cardTitle').textContent = card.title || 'Bez názvu';

            const tags = (card.tags || '').split(',').map(t => t.trim()).filter(Boolean);
            const date = card.createdAt
                ? new Date(card.createdAt).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'long', year: 'numeric' })
                : '';
            const updated = card.updatedAt && card.updatedAt !== card.createdAt
                ? ` · upraveno ${new Date(card.updatedAt).toLocaleDateString('cs-CZ')}`
                : '';
            const tagHtml = tags.map(t =>
                `<span class="tag-badge me-1" style="background:${color}22;color:${color};">${t}</span>`
            ).join('');
            document.getElementById('cardMeta').innerHTML =
                `${tagHtml}${date ? `<span>${date}${updated}</span>` : ''}`;

            renderMarkdown(card.content || '');

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('cardWrap').style.display = 'block';
        }

        function renderMarkdown(content) {
            document.getElementById('renderedContent').innerHTML = marked.parse(content, { breaks: true });
            if (window.MathJax?.typesetPromise) {
                MathJax.typesetPromise([document.getElementById('renderedContent')]).catch(console.error);
            }
        }

        function showError() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
        }

        // ── Edit mode ──────────────────────────────────────────────────
        function enterEdit() {
            if (!currentCard) return;
            document.getElementById('editTitle').value = currentCard.title || '';
            document.getElementById('editSubject').value = currentCard.subject || '';
            document.getElementById('editTags').value = currentCard.tags || '';
            document.getElementById('editTextarea').value = currentCard.content || '';

            document.getElementById('viewMode').style.display = 'none';
            document.getElementById('editMode').style.display = 'block';
            document.getElementById('editBtn').classList.add('d-none');
            document.getElementById('editBtnMobile').classList.add('d-none');
            document.getElementById('deleteBtn').classList.add('d-none');
            document.getElementById('saveBtn').classList.remove('d-none');
            document.getElementById('saveBtn').classList.add('d-inline-flex');
            document.getElementById('cancelBtn').classList.remove('d-none');

            document.getElementById('editTitle').focus();
        }

        function exitEdit() {
            document.getElementById('viewMode').style.display = 'block';
            document.getElementById('editMode').style.display = 'none';
            document.getElementById('editBtn').classList.remove('d-none');
            document.getElementById('editBtnMobile').classList.remove('d-none');
            document.getElementById('deleteBtn').classList.remove('d-none');
            document.getElementById('saveBtn').classList.add('d-none');
            document.getElementById('saveBtn').classList.remove('d-inline-flex');
            document.getElementById('cancelBtn').classList.add('d-none');
        }

        async function doSave() {
            const title = document.getElementById('editTitle').value.trim();
            if (!title) { document.getElementById('editTitle').focus(); return; }

            const updated = {
                ...currentCard,
                title,
                subject: document.getElementById('editSubject').value,
                tags: document.getElementById('editTags').value.trim(),
                content: document.getElementById('editTextarea').value,
                updatedAt: Date.now()
            };

            const btns = [document.getElementById('saveBtn'), document.getElementById('saveBtnBottom')];
            btns.forEach(b => { b.disabled = true; });
            document.getElementById('saveBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                await fetch(`${FIREBASE_URL}/cards/${cardId}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updated)
                });
                currentCard = updated;
                renderCard(updated);
                exitEdit();
            } catch {
                alert('Chyba při ukládání.');
            } finally {
                btns.forEach(b => { b.disabled = false; });
                document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i><span class="d-none d-md-inline ms-1">Uložit</span>';
            }
        }

        ['editBtn', 'editBtnMobile'].forEach(id =>
            document.getElementById(id).addEventListener('click', enterEdit)
        );
        ['cancelBtn', 'cancelBtnBottom'].forEach(id =>
            document.getElementById(id).addEventListener('click', exitEdit)
        );
        ['saveBtn', 'saveBtnBottom'].forEach(id =>
            document.getElementById(id).addEventListener('click', doSave)
        );

        document.getElementById('deleteBtn').addEventListener('click', async () => {
            if (!currentCard || !confirm(`Smazat kartičku „${currentCard.title}"?`)) return;
            try {
                await fetch(`${FIREBASE_URL}/cards/${cardId}.json`, { method: 'DELETE' });
                location.href = 'cards.html';
            } catch {
                alert('Chyba při mazání.');
            }
        });

        loadCard();
    </script>
</body>
</html>
